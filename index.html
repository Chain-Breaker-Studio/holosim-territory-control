<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holosim | Tactical Overview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        body { background: #020408; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; }
        .font-header { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.05); }
        .mud-card { border-top: 4px solid #facc15; }
        .oni-card { border-top: 4px solid #ef4444; }
        .ustur-card { border-top: 4px solid #3b82f6; }
        /* Eliminamos el scroll y permitimos que la tarjeta crezca */
        .no-scroll { overflow: visible; height: auto; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-center border-b border-white/10 pb-4 gap-4">
            <div class="text-center md:text-left">
                <h1 class="font-header text-xl md:text-2xl font-bold uppercase tracking-tighter text-blue-500 italic">Holosim <span class="text-white">Tactical Feed</span></h1>
                <p id="data-age" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-none mt-1 animate-pulse">Sincronizando...</p>
            </div>
            
            <div class="flex gap-4">
                <div class="glass px-4 py-2 rounded flex flex-col items-center">
                    <span class="text-[9px] text-slate-500 uppercase font-bold">Multiplier</span>
                    <span id="multiplier" class="text-lg font-header leading-none">--</span>
                </div>
                <div class="glass px-4 py-2 rounded flex flex-col items-center border-l-2 border-emerald-500">
                    <span class="text-[9px] text-slate-500 uppercase font-bold">Status</span>
                    <span class="text-xs font-bold text-emerald-400 uppercase tracking-tighter">Verified</span>
                </div>
            </div>
        </header>

        <div id="container" class="grid grid-cols-1 md:grid-cols-3 gap-4 items-start">
            </div>

        <footer class="mt-12 flex flex-col md:flex-row justify-between items-center border-t border-white/5 pt-6 gap-4">
            <div class="text-left">
                <p class="text-slate-600 text-[10px] uppercase tracking-[0.3em]">Star Atlas Official API Hub</p>
                <p class="text-slate-400 text-xs mt-1">Intelligence by <span class="text-white font-bold tracking-tighter uppercase">TuNombre</span></p>
            </div>
            
            <div class="flex items-center gap-4">
                <a href="TU_LINK_DE_CAFE" target="_blank" class="bg-white/5 hover:bg-white/10 border border-white/10 px-4 py-2 rounded-lg text-amber-500 text-xs font-bold transition-all flex items-center gap-2">
                    <i class="fa-solid fa-mug-hot"></i> Buy me a coffee
                </a>
            </div>
        </footer>
    </div>

    <script>
        const API_ORIGINAL = 'https://holosim-galaxy.staratlas.com/territory-control';
        const PROXY_RAPIDO = `https://corsproxy.io/?${encodeURIComponent(API_ORIGINAL)}`;

        async function loadData() {
            let data = null;
            try {
                const res = await fetch(API_ORIGINAL);
                if(res.ok) data = await res.json();
            } catch (e) { console.log("CORS Bypass activo"); }

            if (!data) {
                try {
                    const res = await fetch(PROXY_RAPIDO);
                    if(res.ok) data = await res.json();
                } catch (e) {
                    document.getElementById('data-age').innerText = "ERROR DE CONEXIÓN";
                    return;
                }
            }
            if (data) render(data);
        }

        function render(data) {
            const date = new Date(data.timestamp);
            document.getElementById('data-age').innerText = "REFRESH: " + date.toLocaleString();
            document.getElementById('multiplier').innerText = data.timeMultiplier.toFixed(4);

            const cont = document.getElementById('container');
            cont.innerHTML = '';

            ['mud', 'oni', 'ustur'].forEach(key => {
                const f = data.factions[key];
                const color = key === 'mud' ? 'yellow-400' : (key === 'oni' ? 'red-500' : 'blue-500');
                
                cont.innerHTML += `
                    <div class="glass p-4 rounded-xl ${key}-card shadow-2xl">
                        <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-2">
                            <h2 class="font-header text-2xl font-black uppercase text-${color}">${key}</h2>
                            <div class="text-right">
                                <p class="text-lg font-header leading-none">${Math.floor(f.currentPoints).toLocaleString()}</p>
                                <p class="text-[10px] text-emerald-400 font-bold uppercase">+${f.pointsAdded.toFixed(2)}</p>
                            </div>
                        </div>
                        
                        <div class="space-y-1">
                            <div class="flex justify-between text-[9px] text-slate-500 uppercase font-bold px-1 mb-2 tracking-widest">
                                <span>Starbase</span>
                                <span>Lvl • Points</span>
                            </div>
                            ${f.starbases.sort((a,b) => b.level - a.level).map(sb => `
                                <div class="flex justify-between text-xs p-2 bg-white/[0.02] border border-white/[0.03] rounded-md hover:bg-white/[0.05] transition-all">
                                    <span class="text-slate-300 font-bold uppercase tracking-tight">${sb.name}</span>
                                    <span class="text-${color} font-mono">L${sb.level} <span class="text-slate-600 mx-1">|</span> ${sb.points.toFixed(1)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
