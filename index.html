<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLOSIM | SECTOR DOMINANCE ANALYTICS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --neon-blue: #3b82f6;
            --neon-amber: #f59e0b;
            --neon-red: #ef4444;
        }

        body { 
            background: #010204; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; height: 100vh; margin: 0; padding: 0;
        }
        .font-header { font-family: 'Orbitron', sans-serif; }
        
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 20px 20px; z-index: -1;
        }

        .glass { background: rgba(7, 10, 15, 0.85); border: 1px solid rgba(59, 130, 246, 0.1); backdrop-filter: blur(10px); }
        .card-wrapper { position: relative; padding-top: 12px; height: 100%; transition: all 0.5s ease; }
        .neon-card { position: relative; height: 100%; border-radius: 8px; z-index: 10; }
        
        .mud-card { border-left: 4px solid #ef4444; }
        .oni-card { border-left: 4px solid #3b82f6; }
        .ustur-card { border-left: 4px solid #facc15; }

        .rank-tag {
            position: absolute; top: 0; right: 12px;
            padding: 2px 10px; border-radius: 2px 2px 0 0;
            font-size: 10px; font-family: 'Orbitron', sans-serif;
            font-weight: bold; letter-spacing: 1px; z-index: 20;
        }

        .warning-pulse {
            animation: blink 2s infinite;
            color: var(--neon-red) !important;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .fuel-bar {
            background: linear-gradient(90deg, var(--neon-amber) 0%, transparent 100%);
            height: 2px; width: 100%; position: absolute; bottom: 0; left: 0;
        }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; height: 100%; }
        
        @media (min-width: 768px) {
            .tab-content { display: block !important; }
            .mobile-tabs { display: none !important; }
        }
    </style>
</head>
<body class="p-2 md:p-6 flex flex-col">

    <div class="max-w-6xl mx-auto w-full flex flex-col h-full overflow-hidden">
        
        <header class="mb-4 md:mb-6 border-b border-blue-500/20 pb-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex flex-col items-center md:items-start">
                    <div class="flex items-center gap-2">
                        <div id="status-dot" class="w-2 h-2 rounded-full bg-blue-500"></div>
                        <h1 class="font-header text-lg md:text-2xl font-bold uppercase tracking-tighter text-blue-500">
                            HOLOSIM | <span class="text-white">DOMINANCE ANALYTICS</span>
                        </h1>
                    </div>
                    <div class="flex flex-wrap justify-center md:justify-start items-center gap-2 mt-1">
                        <p id="data-label" class="text-[8px] md:text-[10px] font-bold text-slate-500 uppercase italic">ÚLTIMO REPORTE:</p>
                        <p id="data-age" class="text-[8px] md:text-[10px] font-bold text-blue-400 uppercase tracking-widest">SINCRONIZANDO...</p>
                        <span id="api-warning" class="hidden text-[8px] font-bold text-red-500 bg-red-500/10 px-2 py-0.5 rounded border border-red-500/20">SERVIDOR DESACTUALIZADO</span>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p id="label-multiplier" class="text-[7px] md:text-[9px] text-slate-500 uppercase font-bold tracking-widest leading-none">Generación Total</p>
                        <p id="total-gen" class="text-sm md:text-xl font-header leading-none text-white">0.00</p>
                    </div>
                    <div class="flex gap-1 bg-white/5 p-1 rounded border border-white/10">
                        <button onclick="changeLang('es')" class="text-[9px] font-bold text-blue-400 px-1.5">ES</button>
                        <button onclick="changeLang('en')" class="text-[9px] font-bold text-blue-400 px-1.5">EN</button>
                    </div>
                </div>
            </div>
        </header>

        <div id="mobile-tabs-container" class="mobile-tabs flex gap-1 mb-3"></div>
        <div id="container" class="flex flex-col md:flex-row gap-3 md:gap-6 mb-2 md:mb-6 flex-grow overflow-hidden"></div>

        <footer class="mt-auto glass p-3 md:p-5 rounded-t-xl relative overflow-hidden">
            <div class="fuel-bar"></div>
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 border border-blue-500/30 rounded-full flex items-center justify-center bg-blue-500/5">
                        <i class="fa-solid fa-satellite-dish text-blue-400 text-xs"></i>
                    </div>
                    <p class="text-[9px] text-slate-400 max-w-xs leading-tight uppercase font-bold">
                        Los datos reflejan la capacidad de producción en el momento del último snapshot. Si la fecha es antigua, la simulación global está pausada.
                    </p>
                </div>
                <div class="flex gap-4">
                    <a href="https://x.com/QuimeraSA_" target="_blank" class="text-slate-500 hover:text-white transition-colors"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="https://discord.gg/aVM5KjMeB6" target="_blank" class="text-slate-500 hover:text-indigo-400 transition-colors"><i class="fa-brands fa-discord"></i></a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const API_URL = 'https://holosim-galaxy.staratlas.com/territory-control';
        let currentLang = 'es';

        const i18n = {
            es: { gen: "Generación Acumulada", points: "Puntos Snapshot", status: "Estado del Sector" },
            en: { gen: "Accumulated Generation", points: "Snapshot Points", status: "Sector Status" }
        };

        async function loadData() {
            try {
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(API_URL)}`);
                const data = await res.json();
                render(data);
            } catch (e) {
                document.getElementById('data-age').innerText = "ERROR DE CONEXIÓN";
            }
        }

        function render(data) {
            const lastUpdate = new Date(data.timestamp);
            const now = new Date();
            const diffHours = Math.abs(now - lastUpdate) / 36e5;

            const ageEl = document.getElementById('data-age');
            const warnEl = document.getElementById('api-warning');
            const dotEl = document.getElementById('status-dot');

            ageEl.innerText = lastUpdate.toLocaleString();
            
            if (diffHours > 24) {
                ageEl.classList.add('warning-pulse');
                warnEl.classList.remove('hidden');
                dotEl.classList.replace('bg-blue-500', 'bg-red-500');
            }

            let totalPointsAdded = 0;
            const cont = document.getElementById('container');
            const tabsCont = document.getElementById('mobile-tabs-container');
            cont.innerHTML = '';
            tabsCont.innerHTML = '';

            const sorted = Object.entries(data.factions).sort(([,a], [,b]) => b.currentPoints - a.currentPoints);

            sorted.forEach(([key, f], index) => {
                totalPointsAdded += f.pointsAdded;
                const rank = index + 1;
                const colorClass = key === 'mud' ? 'text-red-500' : (key === 'oni' ? 'text-blue-500' : 'text-yellow-400');
                const bgRank = key === 'mud' ? 'bg-red-500' : (key === 'oni' ? 'bg-blue-500' : 'bg-yellow-500');

                // Generar Tabs Móvil
                tabsCont.innerHTML += `
                    <button onclick="showTab('${key}')" class="flex-1 py-2 glass text-[10px] font-header ${colorClass}">${key.toUpperCase()}</button>
                `;

                // Generar Cards
                cont.innerHTML += `
                    <div id="tab-${key}" class="tab-content flex-1 active">
                        <div class="card-wrapper">
                            <div class="rank-tag ${bgRank} text-black">RANK #${rank}</div>
                            <div class="glass p-4 rounded-lg neon-card ${key}-card flex flex-col h-full">
                                <div class="flex justify-between items-start mb-4">
                                    <h2 class="font-header text-2xl font-black uppercase ${colorClass}">${key}</h2>
                                    <div class="text-right">
                                        <p class="text-xs text-slate-500 uppercase font-bold">${i18n[currentLang].points}</p>
                                        <p class="text-xl font-header text-white">${Math.floor(f.currentPoints).toLocaleString()}</p>
                                    </div>
                                </div>
                                <div class="bg-white/5 p-2 rounded mb-4 border border-white/5">
                                    <p class="text-[9px] text-slate-400 uppercase font-bold">${i18n[currentLang].gen}</p>
                                    <p class="text-lg text-emerald-400 font-header">+${f.pointsAdded.toFixed(2)} <span class="text-[10px]">P/SEC</span></p>
                                </div>
                                <div class="overflow-y-auto pr-1 flex-grow space-y-2">
                                    ${f.starbases.map(sb => `
                                        <div class="flex justify-between border-b border-white/5 pb-1">
                                            <span class="text-[10px] text-slate-400 uppercase truncate">${sb.name.replace(/_/g, ' ')}</span>
                                            <span class="${colorClass} font-bold text-[10px]">+${sb.points.toFixed(1)}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-gen').innerText = totalPointsAdded.toFixed(2);
        }

        loadData();
    </script>
</body>
</html>
