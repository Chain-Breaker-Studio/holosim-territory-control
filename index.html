<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLOSIM | SECTOR DOMINANCE ANALYTICS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --neon-blue: #3b82f6;
            --neon-amber: #f59e0b;
        }

        body { 
            background: #010204; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; height: 100vh; margin: 0; padding: 0;
        }
        .font-header { font-family: 'Orbitron', sans-serif; }
        
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 20px 20px; z-index: -1;
        }

        .glass { background: rgba(7, 10, 15, 0.85); border: 1px solid rgba(59, 130, 246, 0.1); backdrop-filter: blur(10px); }
        
        .neon-card { position: relative; height: 100%; border-radius: 8px; }
        .neon-card::after {
            content: ""; position: absolute; inset: -1px; 
            z-index: -1; filter: blur(10px); opacity: 0.15;
            border-radius: 8px;
        }

        /* COLORES FACCIONES */
        .mud-card::after { background: #ef4444; }
        .oni-card::after { background: #3b82f6; }
        .ustur-card::after { background: #facc15; }
        .mud-card { border-left: 4px solid #ef4444; }
        .oni-card { border-left: 4px solid #3b82f6; }
        .ustur-card { border-left: 4px solid #facc15; }

        .btn-execute {
            background: rgba(59, 130, 246, 0.1); border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .fuel-bar {
            background: linear-gradient(90deg, var(--neon-amber) 0%, transparent 100%);
            height: 2px; width: 100%; position: absolute; bottom: 0; left: 0;
        }

        @media (max-width: 767px) {
            body { overflow-y: auto; height: auto; }
            .mobile-stack { flex-direction: column !important; align-items: center !important; text-align: center !important; }
        }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; height: 100%; }
        
        @media (min-width: 768px) {
            .tab-content { display: block !important; }
            .mobile-tabs { display: none !important; }
        }

        .dot-pulse {
            width: 8px; height: 8px; background: #3b82f6; border-radius: 50%;
            box-shadow: 0 0 0 rgba(59, 130, 246, 0.4); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="p-2 md:p-6 flex flex-col">

    <div class="max-w-6xl mx-auto w-full flex flex-col h-full overflow-hidden">
        
        <header class="mb-4 md:mb-6 border-b border-blue-500/20 pb-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex flex-col items-center md:items-start">
                    <div class="flex items-center gap-2">
                        <div class="dot-pulse"></div>
                        <h1 class="font-header text-lg md:text-2xl font-bold uppercase tracking-tighter text-blue-500 text-center md:text-left">
                            HOLOSIM | <span class="text-white">SECTOR DOMINANCE ANALYTICS</span>
                        </h1>
                    </div>
                    <div class="flex flex-wrap justify-center md:justify-start items-center gap-2 mt-1">
                        <p id="data-label" class="text-[8px] md:text-[10px] font-bold text-slate-500 uppercase italic">DATOS OFICIALES DEL:</p>
                        <p id="data-age" class="text-[8px] md:text-[10px] font-bold text-blue-400 uppercase">Cargando...</p>
                        <a href="https://holosim-galaxy.staratlas.com/territory-control" target="_blank" class="text-[8px] md:text-[9px] text-blue-400/40 hover:text-blue-400 font-bold uppercase">
                             <i class="fa-solid fa-link"></i> FUENTE API STAR ATLAS
                        </a>
                    </div>
                </div>

                <div class="flex items-center justify-between md:justify-end gap-4 md:gap-8 w-full md:w-auto border-t md:border-t-0 border-white/5 pt-3 md:pt-0">
                    <div class="flex items-center gap-3">
                        <div class="flex gap-1 bg-white/5 p-1 rounded border border-white/10">
                            <button onclick="changeLang('es')" class="text-[9px] font-bold text-blue-400 hover:text-white px-1.5">ES</button>
                            <button onclick="changeLang('en')" class="text-[9px] font-bold text-blue-400 hover:text-white px-1.5">EN</button>
                        </div>
                        <div class="text-right group relative cursor-help">
                            <p class="text-[7px] md:text-[9px] text-slate-500 uppercase font-bold tracking-widest leading-none">Time Mult.</p>
                            <p id="multiplier" class="text-sm md:text-xl font-header leading-none text-white">--</p>
                            <div class="absolute right-0 top-10 w-48 p-2 glass text-[9px] text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none border border-blue-500/30">
                                <p id="tooltip-text">Factor de velocidad de cálculo de puntos en la simulación.</p>
                            </div>
                        </div>
                    </div>
                    <a href="https://holosim.staratlas.com/" target="_blank" class="btn-execute px-4 py-2 md:px-6 md:py-2 rounded-sm text-[9px] md:text-[10px] font-header tracking-widest text-blue-400 uppercase">
                        GO HOLOSIM
                    </a>
                </div>
            </div>
        </header>

        <div class="mobile-tabs flex gap-1 mb-3">
            <button onclick="showTab('mud')" id="btn-mud" class="flex-1 py-2 glass text-[10px] font-header text-red-500 border-b-2 border-red-500">MUD</button>
            <button onclick="showTab('oni')" id="btn-oni" class="flex-1 py-2 glass text-[10px] font-header text-blue-500 opacity-50">ONI</button>
            <button onclick="showTab('ustur')" id="btn-ustur" class="flex-1 py-2 glass text-[10px] font-header text-yellow-500 opacity-50">USTUR</button>
        </div>

        <div id="container" class="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-6 mb-2 md:mb-6 flex-grow overflow-hidden"></div>

        <footer class="mt-auto glass p-3 md:p-5 rounded-t-xl relative overflow-hidden">
            <div class="fuel-bar"></div>
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 border border-blue-500/50 rounded-full flex items-center justify-center bg-blue-500/10">
                        <i class="fa-solid fa-microchip text-blue-400 text-lg"></i>
                    </div>
                    <div>
                        <div class="flex items-center gap-2">
                            <p class="text-white font-header text-xs tracking-wider uppercase leading-none">Daenerys84</p>
                            <a href="https://x.com/Daenerys_084" target="_blank" class="text-blue-400 text-[12px] hover:text-white transition-all">
                                <i class="fa-brands fa-x-twitter"></i>
                            </a>
                        </div>
                        <p id="footer-role" class="text-blue-500/60 uppercase text-[8px] font-bold mt-1 tracking-tighter">Miembro Directivo // Quimera Guild</p>
                    </div>
                </div>

                <div class="flex flex-col items-center">
                    <a href="https://ko-fi.com/chainbreaker" target="_blank" class="px-5 py-1.5 bg-amber-500/5 border border-amber-500/30 rounded text-amber-500 font-header text-[9px] tracking-widest uppercase hover:bg-amber-500/10 transition-all flex items-center gap-2">
                        <i class="fa-solid fa-bolt text-[8px]"></i> <span id="btn-tip">Propina Operativa</span>
                    </a>
                    <p id="community-text" class="text-[7px] text-slate-500 uppercase mt-1 tracking-[0.2em]">Creado para la comunidad</p>
                </div>

                <div class="flex items-center gap-4 border-t md:border-t-0 md:border-l border-white/10 pt-3 md:pt-0 md:pl-4">
                    <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">Sigue a Quimera:</p>
                    <div class="flex gap-4 text-slate-400">
                        <a href="https://x.com/QuimeraSA_" target="_blank" class="hover:text-white transition-colors">
                            <i class="fa-brands fa-x-twitter text-[14px]"></i>
                        </a>
                        <a href="https://discord.gg/aVM5KjMeB6" target="_blank" class="hover:text-indigo-400 transition-colors">
                            <i class="fa-brands fa-discord text-[14px]"></i>
                        </a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const API_ORIGINAL = 'https://holosim-galaxy.staratlas.com/territory-control';
        const PROXY_RAPIDO = `https://corsproxy.io/?${encodeURIComponent(API_ORIGINAL)}`;
        let activeTab = 'mud';
        let currentLang = 'es';

        const i18n = {
            es: { dataLabel: "DATOS OFICIALES DEL:", footerRole: "Miembro Directivo // Quimera Guild", communityText: "Creado para la comunidad", btnTip: "Propina Operativa", tooltip: "Factor de velocidad de cálculo de puntos en la simulación.", sectorControl: "Control de Sector" },
            en: { dataLabel: "OFFICIAL DATA FROM:", footerRole: "Executive Member // Quimera Guild", communityText: "Created for the community", btnTip: "Support Project", tooltip: "Speed factor for point calculation in the simulation.", sectorControl: "Sector Control" }
        };

        function changeLang(lang) {
            currentLang = lang;
            document.getElementById('data-label').innerText = i18n[lang].dataLabel;
            document.getElementById('footer-role').innerText = i18n[lang].footerRole;
            document.getElementById('community-text').innerText = i18n[lang].communityText;
            document.getElementById('btn-tip').innerText = i18n[lang].btnTip;
            document.getElementById('tooltip-text').innerText = i18n[lang].tooltip;
            loadData();
        }

        async function loadData() {
            let data = null;
            try {
                const res = await fetch(API_ORIGINAL);
                if(res.ok) data = await res.json();
            } catch (e) {}
            if (!data) {
                try {
                    const res = await fetch(PROXY_RAPIDO);
                    if(res.ok) data = await res.json();
                } catch (e) {
                    document.getElementById('data-age').innerText = "SYSTEM ERROR";
                    return;
                }
            }
            if (data) render(data);
        }

        function showTab(faction) {
            activeTab = faction;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(`tab-${faction}`);
            if(target) target.classList.add('active');
            
            const colors = { mud: '#ef4444', oni: '#3b82f6', ustur: '#facc15' };
            ['mud', 'oni', 'ustur'].forEach(f => {
                const btn = document.getElementById(`btn-${f}`);
                if(btn) {
                    btn.style.opacity = f === faction ? "1" : "0.5";
                    btn.style.borderBottom = f === faction ? `2px solid ${colors[f]}` : "none";
                }
            });
        }

        function render(data) {
            const date = new Date(data.timestamp);
            document.getElementById('data-age').innerText = date.toLocaleString();
            document.getElementById('multiplier').innerText = data.timeMultiplier.toFixed(4);

            const cont = document.getElementById('container');
            cont.innerHTML = '';

            ['mud', 'oni', 'ustur'].forEach(key => {
                const f = data.factions[key];
                const colorClass = key === 'mud' ? 'text-red-500' : (key === 'oni' ? 'text-blue-500' : 'text-yellow-400');
                
                cont.innerHTML += `
                    <div id="tab-${key}" class="tab-content ${key === activeTab ? 'active' : ''}">
                        <div class="glass p-3 md:p-5 rounded-lg neon-card ${key}-card flex flex-col h-full">
                            <div class="flex justify-between items-start mb-2 md:mb-4">
                                <div>
                                    <h2 class="font-header text-xl md:text-2xl font-black uppercase ${colorClass}">${key}</h2>
                                    <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">${i18n[currentLang].sectorControl}</p>
                                </div>
                                <div class="text-right leading-none">
                                    <p class="text-lg md:text-xl font-bold font-header text-white">${Math.floor(f.currentPoints).toLocaleString()}</p>
                                    <p class="text-[8px] md:text-[9px] text-emerald-400 font-bold uppercase mt-1">+${f.pointsAdded.toFixed(2)}</p>
                                </div>
                            </div>
                            <div class="space-y-1 md:space-y-2 overflow-y-auto pr-1 flex-grow scroll-thin">
                                ${f.starbases.sort((a,b) => b.level - a.level).map(sb => `
                                    <div class="flex justify-between items-center border-b border-white/5 pb-1">
                                        <span class="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase truncate mr-2">${sb.name}</span>
                                        <div class="flex items-center gap-2 shrink-0">
                                            <span class="text-[7px] md:text-[8px] bg-white/5 px-1 rounded text-slate-300">L${sb.level}</span>
                                            <span class="${colorClass} font-bold text-[9px] md:text-[10px]">${sb.points.toFixed(1)}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
