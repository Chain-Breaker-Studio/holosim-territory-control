<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holosim Faction Progress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .mud-text { color: #facc15; } .mud-bg { background-color: #facc15; }
        .oni-text { color: #ef4444; } .oni-bg { background-color: #ef4444; }
        .ustur-text { color: #3b82f6; } .ustur-bg { background-color: #3b82f6; }
        .glow-mud { box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }
        .glow-oni { box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .glow-ustur { box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-8 border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-4xl font-black uppercase tracking-tighter">Holosim <span class="text-slate-500 text-2xl">Season 1</span></h1>
                <p id="timestamp" class="text-slate-400 text-sm italic mt-1"></p>
            </div>
            <div class="text-right">
                <p class="text-xs uppercase text-slate-500 font-bold">Multiplier</p>
                <p id="multiplier" class="text-xl font-mono"></p>
            </div>
        </header>

        <div id="faction-cards" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            </div>

        <h2 class="text-xl font-bold mb-4 uppercase tracking-widest text-slate-500">Starbase Deployment</h2>
        <div id="starbase-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 text-xs font-mono">
            </div>
    </div>

    <script>
        // PEGA AQUÍ TU NUEVO JSON CUANDO SE ACTUALICE
        const rawData = {
          "timestamp": "2026-03-17T17:22:09.040Z",
          "season": 1,
          "timeMultiplier": 0.976550277777778,
          "factions": {
            "mud": { "name": "MUD", "color": "mud", "data": { "faction": 1, "previousPoints": 40356.58, "pointsAdded": 244.13, "currentPoints": 40600.72, "starbaseCount": 17, "starbases": [] } },
            "oni": { "name": "ONI", "color": "oni", "data": { "faction": 2, "previousPoints": 39549.34, "pointsAdded": 234.37, "currentPoints": 39783.71, "starbaseCount": 17, "starbases": [] } },
            "ustur": { "name": "USTUR", "color": "ustur", "data": { "faction": 3, "previousPoints": 39712.68, "pointsAdded": 234.37, "currentPoints": 39947.06, "starbaseCount": 17, "starbases": [] } }
          }
        };

        // NOTA: Para el ejemplo simplificado uso los datos directos del JSON original que pasaste.
        const data = /* Coloca aquí el JSON completo que me pasaste */;
        // Por brevedad, voy a usar una variable simplificada del que pusiste en el prompt:
        const fullData = { ...rawData }; // En tu archivo, pega el JSON real aquí.

        document.getElementById('timestamp').innerText = new Date(fullData.timestamp).toLocaleString();
        document.getElementById('multiplier').innerText = fullData.timeMultiplier.toFixed(4) + 'x';

        const factionContainer = document.getElementById('faction-cards');
        const starbaseContainer = document.getElementById('starbase-grid');

        for (const [key, faction] of Object.entries(fullData.factions)) {
            const fInfo = faction; 
            const colorClass = key === 'mud' ? 'mud' : (key === 'oni' ? 'oni' : 'ustur');
            
            // Card HTML
            factionContainer.innerHTML += `
                <div class="card p-6 rounded-xl border-t-4 border-${colorClass}-bg glow-${colorClass}">
                    <h3 class="text-3xl font-bold uppercase mb-4 ${colorClass}-text">${key.toUpperCase()}</h3>
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-slate-400">Total Points</span>
                            <span class="text-xl font-bold font-mono">${faction.currentPoints.toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between items-center text-emerald-400">
                            <span class="text-xs uppercase">Progress Added</span>
                            <span class="font-bold">+${faction.pointsAdded.toFixed(2)}</span>
                        </div>
                        <div class="w-full bg-slate-800 h-1 mt-4 rounded-full overflow-hidden">
                            <div class="${colorClass}-bg h-full" style="width: ${(faction.currentPoints/41000)*100}%"></div>
                        </div>
                        <p class="text-[10px] text-slate-500 mt-2 italic text-right">${faction.starbaseCount} Starbases active</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
