<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild Dashboard: Holosim Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        .card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
        .mud-text { color: #facc15; } .mud-bg { background-color: #facc15; }
        .oni-text { color: #ef4444; } .oni-bg { background-color: #ef4444; }
        .ustur-text { color: #3b82f6; } .ustur-bg { background-color: #3b82f6; }
        .glow-mud:hover { box-shadow: 0 0 20px rgba(250, 204, 21, 0.2); border-color: #facc15; }
        .glow-oni:hover { box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); border-color: #ef4444; }
        .glow-ustur:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); border-color: #3b82f6; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading { animation: pulse 2s infinite; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-slate-800 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter italic">HOLOSIM <span class="text-slate-500 not-italic font-light">FACTION TRACKER</span></h1>
                <p id="status-text" class="text-emerald-500 text-xs font-mono uppercase tracking-widest mt-1 mt-1 loading">Conectando con la Galaxia...</p>
            </div>
            <div class="text-center md:text-right bg-slate-900 p-3 rounded-lg border border-slate-800">
                <p class="text-[10px] uppercase text-slate-500 font-bold tracking-widest">Multiplicador de Tiempo</p>
                <p id="multiplier" class="text-xl font-mono text-white">--</p>
            </div>
        </header>

        <div id="faction-cards" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="col-span-full text-center py-20 text-slate-600">Obteniendo datos de Star Atlas...</div>
        </div>

        <footer class="text-center text-slate-600 text-[10px] uppercase tracking-[0.2em] mt-20">
            Actualización Automática vía Holosim API • <span id="last-update">--</span>
        </footer>
    </div>

    <script>
        const API_URL = 'https://holosim-galaxy.staratlas.com/territory-control';

        async function updateDashboard() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                renderData(data);
                
                document.getElementById('status-text').innerText = "Sincronizado con Holosim";
                document.getElementById('status-text').classList.remove('loading', 'text-emerald-500');
                document.getElementById('status-text').classList.add('text-slate-500');
                document.getElementById('last-update').innerText = new Date().toLocaleString();
            } catch (error) {
                console.error("Error cargando datos:", error);
                document.getElementById('status-text').innerText = "Error de conexión";
                document.getElementById('status-text').classList.add('text-red-500');
            }
        }

        function renderData(data) {
            const container = document.getElementById('faction-cards');
            document.getElementById('multiplier').innerText = data.timeMultiplier.toFixed(5) + 'x';
            
            container.innerHTML = ''; // Limpiar mensaje de carga

            // Ordenar facciones por puntos (opcional)
            const factionKeys = Object.keys(data.factions);
            
            factionKeys.forEach(key => {
                const faction = data.factions[key];
                const color = key === 'mud' ? 'mud' : (key === 'oni' ? 'oni' : 'ustur');
                
                const cardHtml = `
                    <div class="card p-6 rounded-2xl glow-${color}">
                        <div class="flex justify-between items-start mb-6">
                            <h3 class="text-2xl font-black uppercase ${color}-text">${key}</h3>
                            <span class="bg-slate-800 text-white text-[10px] px-2 py-1 rounded font-bold italic">LVL ${key === 'mud' ? 'MUD' : (key === 'oni' ? 'ONI' : 'UST')}</span>
                        </div>
                        
                        <div class="space-y-4">
                            <div>
                                <p class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Puntos Actuales</p>
                                <p class="text-3xl font-mono font-bold">${Math.floor(faction.currentPoints).toLocaleString()}</p>
                            </div>
                            
                            <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Progreso +</p>
                                    <p class="text-emerald-400 font-mono font-bold">+${faction.pointsAdded.toFixed(2)}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Bases</p>
                                    <p class="text-white font-mono">${faction.starbaseCount}</p>
                                </div>
                            </div>

                            <div class="w-full bg-slate-800 h-1.5 rounded-full mt-4 overflow-hidden">
                                <div class="${color}-bg h-full shadow-[0_0_10px_#fff]" style="width: ${(faction.currentPoints/41000)*100}%"></div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // Ejecutar al cargar
        updateDashboard();
        // Auto-actualizar cada 5 minutos
        setInterval(updateDashboard, 300000);
    </script>
</body>
</html>
