<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holosim | Faction Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        body { 
            background-color: #05070a; 
            color: #e2e8f0; 
            font-family: 'Rajdhani', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #111827 0%, #05070a 100%);
        }
        
        .font-header { font-family: 'Orbitron', sans-serif; }
        
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .mud-accent { border-top: 4px solid #facc15; box-shadow: inset 0 4px 20px -10px rgba(250, 204, 21, 0.3); }
        .oni-accent { border-top: 4px solid #ef4444; box-shadow: inset 0 4px 20px -10px rgba(239, 68, 68, 0.3); }
        .ustur-accent { border-top: 4px solid #3b82f6; box-shadow: inset 0 4px 20px -10px rgba(59, 130, 246, 0.3); }

        .starbase-row:nth-child(even) { background: rgba(255,255,255,0.02); }
        
        .status-dot {
            height: 8px; width: 8px; border-radius: 50%; display: inline-block;
            box-shadow: 0 0 10px currentColor;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-white/5 rounded-xl border border-white/10">
                    <i class="fa-solid fa-satellite-dish text-2xl text-blue-400"></i>
                </div>
                <div>
                    <h1 class="font-header text-3xl font-black tracking-tighter uppercase leading-none">Holosim <span class="text-blue-500">Intell</span></h1>
                    <p class="text-slate-500 text-xs font-bold tracking-[0.3em] uppercase mt-1" id="update-timer">Sincronizando Galaxia...</p>
                </div>
            </div>

            <div class="flex gap-4">
                <div class="glass-card px-6 py-3 rounded-xl flex flex-col items-center">
                    <span class="text-[10px] uppercase font-bold text-slate-500 italic">Season</span>
                    <span class="text-xl font-header font-bold" id="season-num">--</span>
                </div>
                <div class="glass-card px-6 py-3 rounded-xl flex flex-col items-center">
                    <span class="text-[10px] uppercase font-bold text-slate-500 italic">Time Multiplier</span>
                    <span class="text-xl font-header font-bold text-blue-400" id="multiplier">--</span>
                </div>
            </div>
        </header>

        <div id="factions-container" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            </div>

        <footer class="mt-16 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-slate-500 text-sm">
                <p class="font-bold">Creado por <span class="text-white underline tracking-widest uppercase text-xs">TuNombre/ID</span></p>
                <p class="text-xs">Datos en tiempo real extraídos de la API de Star Atlas.</p>
            </div>
            
            <div class="flex items-center gap-4">
                <a href="#" class="bg-amber-500 hover:bg-amber-400 text-black px-6 py-2 rounded-full font-bold transition-all flex items-center gap-2 text-sm shadow-lg shadow-amber-500/20">
                    <i class="fa-solid fa-coffee"></i> Invítame a un café
                </a>
                <div class="flex gap-2">
                    <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center border border-white/10 hover:border-blue-500 cursor-pointer transition-colors text-slate-400 hover:text-blue-500"><i class="fa-brands fa-discord"></i></div>
                    <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center border border-white/10 hover:border-blue-500 cursor-pointer transition-colors text-slate-400 hover:text-blue-500"><i class="fa-brands fa-twitter"></i></div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // URL con Proxy para evitar bloqueo CORS
        const API_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://holosim-galaxy.staratlas.com/territory-control');

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderDashboard(data);
                document.getElementById('update-timer').innerText = "Terminal Online • " + new Date().toLocaleTimeString();
            } catch (err) {
                console.error(err);
                document.getElementById('update-timer').innerText = "Error de Conexión";
            }
        }

        function renderDashboard(data) {
            document.getElementById('season-num').innerText = data.season;
            document.getElementById('multiplier').innerText = data.timeMultiplier.toFixed(4) + 'x';
            
            const container = document.getElementById('factions-container');
            container.innerHTML = '';

            for (const [key, faction] of Object.entries(data.factions)) {
                const accentClass = key + '-accent';
                const textClass = key === 'mud' ? 'text-yellow-400' : (key === 'oni' ? 'text-red-500' : 'text-blue-500');
                const barClass = key === 'mud' ? 'bg-yellow-400' : (key === 'oni' ? 'bg-red-500' : 'bg-blue-500');

                // Ordenar starbases por nivel (mayor a menor)
                const sortedBases = faction.starbases.sort((a, b) => b.level - a.level);

                let factionHtml = `
                    <div class="glass-card rounded-2xl overflow-hidden flex flex-col ${accentClass}">
                        <div class="p-6 border-b border-white/5">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="font-header text-3xl font-black uppercase tracking-tighter ${textClass}">${key}</h2>
                                <span class="text-[10px] font-bold bg-white/5 px-2 py-1 rounded text-slate-400 uppercase tracking-widest">ID: ${faction.faction}</span>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <p class="text-[10px] uppercase font-bold text-slate-500 tracking-widest">Puntos Totales</p>
                                    <p class="text-2xl font-header font-bold">${Math.floor(faction.currentPoints).toLocaleString()}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] uppercase font-bold text-slate-500 tracking-widest">Último Ciclo</p>
                                    <p class="text-xl font-header font-bold text-emerald-400 leading-none">+${faction.pointsAdded.toFixed(2)}</p>
                                </div>
                            </div>
                        </div>

                        <div class="p-6 flex-grow flex flex-col">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400">Starbases (${faction.starbaseCount})</h3>
                                <i class="fa-solid fa-layer-group text-slate-600 text-xs"></i>
                            </div>
                            
                            <div class="custom-scroll overflow-y-auto max-h-[400px] pr-2 space-y-1">
                                ${sortedBases.map(sb => `
                                    <div class="starbase-row p-3 rounded-lg flex justify-between items-center">
                                        <div>
                                            <p class="text-sm font-bold font-header">${sb.name}</p>
                                            <p class="text-[9px] text-slate-500 uppercase tracking-tighter">Nivel ${sb.level}</p>
                                        </div>
                                        <div class="text-right">
                                            <p class="text-xs font-mono font-bold ${textClass}">${sb.points.toFixed(2)}</p>
                                            <div class="w-16 bg-white/5 h-1 rounded-full mt-1 overflow-hidden">
                                                <div class="${barClass} h-full" style="width: ${(sb.level/6)*100}%"></div>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += factionHtml;
            }
        }

        fetchData();
        setInterval(fetchData, 60000); // Actualiza cada minuto
    </script>
</body>
</html>
