<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holosim | Faction Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; }
        .font-header { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .mud-accent { border-top: 4px solid #facc15; }
        .oni-accent { border-top: 4px solid #ef4444; }
        .ustur-accent { border-top: 4px solid #3b82f6; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-bolt text-2xl text-yellow-500"></i>
                <div>
                    <h1 class="font-header text-3xl font-black uppercase tracking-tighter">Holosim <span class="text-blue-500">Tracker</span></h1>
                    <p id="update-timer" class="text-slate-500 text-xs font-bold uppercase tracking-widest animate-pulse">Conectando con la red...</p>
                </div>
            </div>
            <div class="flex gap-4 font-header">
                <div class="glass-card px-4 py-2 rounded-lg text-center">
                    <p class="text-[10px] text-slate-500 uppercase">Season</p>
                    <p id="season-num" class="text-xl">--</p>
                </div>
                <div class="glass-card px-4 py-2 rounded-lg text-center">
                    <p class="text-[10px] text-slate-500 uppercase">Multiplier</p>
                    <p id="multiplier" class="text-xl text-blue-400">--</p>
                </div>
            </div>
        </header>

        <div id="factions-container" class="grid grid-cols-1 lg:grid-cols-3 gap-8 text-center text-slate-500 py-20">
            <div class="col-span-full">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
                <p>Cargando datos en tiempo real...</p>
            </div>
        </div>

        <footer class="mt-16 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-slate-500 text-sm italic">
                Sincronizado con Holosim API Oficial
            </div>
            <a href="https://www.buymeacoffee.com" target="_blank" class="bg-yellow-500 hover:bg-yellow-400 text-black px-6 py-2 rounded-full font-bold transition-all flex items-center gap-2 shadow-lg shadow-yellow-500/20">
                <i class="fa-solid fa-coffee"></i> Buy me a coffee
            </a>
        </footer>
    </div>

    <script>
        // Usamos un proxy diferente más estable
        const API_URL = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://holosim-galaxy.staratlas.com/territory-control');

        async function updateData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network error');
                
                const wrapper = await response.json();
                // AllOrigins envuelve la respuesta en un campo llamado 'contents'
                const data = JSON.parse(wrapper.contents);
                
                render(data);
                document.getElementById('update-timer').innerText = "LIVE • " + new Date().toLocaleTimeString();
                document.getElementById('update-timer').classList.remove('animate-pulse');
            } catch (err) {
                console.error("Error:", err);
                document.getElementById('update-timer').innerText = "Error al conectar. Reintentando...";
            }
        }

        function render(data) {
            document.getElementById('season-num').innerText = data.season;
            document.getElementById('multiplier').innerText = data.timeMultiplier.toFixed(4) + 'x';
            
            const container = document.getElementById('factions-container');
            container.innerHTML = '';

            const keys = ['mud', 'oni', 'ustur'];
            keys.forEach(key => {
                const f = data.factions[key];
                const color = key === 'mud' ? 'text-yellow-400' : (key === 'oni' ? 'text-red-500' : 'text-blue-500');
                const barColor = key === 'mud' ? 'bg-yellow-400' : (key === 'oni' ? 'bg-red-500' : 'bg-blue-500');

                container.innerHTML += `
                    <div class="glass-card rounded-2xl overflow-hidden flex flex-col ${key}-accent">
                        <div class="p-6 border-b border-white/5 bg-white/5">
                            <h2 class="font-header text-4xl font-black uppercase ${color}">${key}</h2>
                            <div class="mt-4 flex justify-between">
                                <div class="text-left">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold">Total Pts</p>
                                    <p class="text-2xl font-bold font-header">${Math.floor(f.currentPoints).toLocaleString()}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold">Gain</p>
                                    <p class="text-xl font-bold text-emerald-400">+${f.pointsAdded.toFixed(1)}</p>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 flex-grow">
                            <p class="text-[10px] uppercase text-slate-500 font-bold mb-4 tracking-widest text-left">Starbases (${f.starbaseCount})</p>
                            <div class="custom-scroll overflow-y-auto max-h-[350px] space-y-2 text-left">
                                ${f.starbases.sort((a,b) => b.level - a.level).map(sb => `
                                    <div class="bg-black/20 p-2 rounded flex justify-between items-center border border-white/5">
                                        <div class="text-xs font-bold font-header uppercase">${sb.name} <span class="text-slate-500 text-[9px] ml-2">Lvl ${sb.level}</span></div>
                                        <div class="text-[11px] font-mono ${color}">${sb.points.toFixed(2)}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        updateData();
        setInterval(updateData, 60000); // Refresca cada 1 minuto
    </script>
</body>
</html>
