<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLOSIM | SECTOR DOMINANCE ANALYTICS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --neon-blue: #3b82f6;
            --neon-amber: #f59e0b;
        }

        /* CAMBIO CLAVE: Permitir scroll en el body y quitar altura fija */
        body { 
            background: #010204; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; 
            min-height: 100vh; margin: 0; padding: 0; overflow-y: auto;
        }
        
        .font-header { font-family: 'Orbitron', sans-serif; }
        
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 20px 20px; z-index: -1;
        }

        .glass { background: rgba(7, 10, 15, 0.85); border: 1px solid rgba(59, 130, 246, 0.1); backdrop-filter: blur(10px); }
        
        /* Ajuste de tarjetas para que no tengan scroll interno */
        .card-wrapper { position: relative; padding-top: 12px; height: auto; }
        .neon-card { position: relative; border-radius: 8px; z-index: 10; height: auto; }
        
        .neon-card::after {
            content: ""; position: absolute; inset: -1px; 
            z-index: -1; filter: blur(10px); opacity: 0.15;
            border-radius: 8px;
        }

        .mud-card::after { background: #ef4444; }
        .oni-card::after { background: #3b82f6; }
        .ustur-card::after { background: #facc15; }
        .mud-card { border-left: 4px solid #ef4444; }
        .oni-card { border-left: 4px solid #3b82f6; }
        .ustur-card { border-left: 4px solid #facc15; }

        .rank-tag {
            position: absolute; top: 0; right: 12px;
            padding: 2px 10px; border-radius: 2px 2px 0 0;
            font-size: 10px; font-family: 'Orbitron', sans-serif;
            font-weight: bold; z-index: 20;
        }

        .leader-glow { box-shadow: 0 0 30px rgba(59, 130, 246, 0.1); border-top: 1px solid rgba(255,255,255,0.05); }
        .btn-execute { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--neon-blue); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .fuel-bar { background: linear-gradient(90deg, var(--neon-amber) 0%, transparent 100%); height: 2px; width: 100%; position: absolute; bottom: 0; left: 0; }

        .version-tag { position: fixed; top: 0; right: 0; padding: 2px 6px; background: rgba(7, 10, 15, 0.9); font-size: 8px; color: rgba(59, 130, 246, 0.5); z-index: 100; border-left: 1px solid rgba(59, 130, 246, 0.2); }

        .dot-pulse { width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        /* Mobile Tab Logic */
        @media (max-width: 767px) {
            .tab-content { display: none; }
            .tab-content.active { display: block; }
        }
        @media (min-width: 768px) {
            .tab-content { display: block !important; flex: 1; }
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="version-tag font-header tracking-tighter">BUILD_v1.4.0_RELOADED</div>

    <div class="max-w-6xl mx-auto w-full flex flex-col">
        
        <header class="mb-6 border-b border-blue-500/20 pb-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex flex-col items-center md:items-start">
                    <div class="flex items-center gap-2">
                        <div class="dot-pulse"></div>
                        <h1 class="font-header text-lg md:text-2xl font-bold uppercase tracking-tighter text-blue-500">
                            HOLOSIM | <span class="text-white">SECTOR DOMINANCE</span>
                        </h1>
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                        <p id="data-label" class="text-[9px] font-bold text-slate-500 uppercase italic">DATOS OFICIALES DEL:</p>
                        <p id="data-age" class="text-[9px] font-bold text-blue-400 uppercase">Cargando...</p>
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <div class="flex gap-1 bg-white/5 p-1 rounded border border-white/10">
                        <button onclick="changeLang('es')" class="text-[9px] font-bold text-blue-400 hover:text-white px-2">ES</button>
                        <button onclick="changeLang('en')" class="text-[9px] font-bold text-blue-400 hover:text-white px-2">EN</button>
                    </div>
                    <div class="text-right group relative cursor-help">
                        <p id="label-multiplier" class="text-[8px] text-slate-500 uppercase font-bold tracking-widest leading-none mb-1">Multiplicador de Tiempo</p>
                        <p id="multiplier" class="text-xl font-header text-white leading-none">--</p>
                    </div>
                    <a href="https://holosim.staratlas.com/" target="_blank" class="btn-execute px-6 py-2 rounded-sm text-[10px] font-header text-blue-400 uppercase">GO HOLOSIM</a>
                </div>
            </div>
        </header>

        <div id="mobile-tabs-container" class="md:hidden flex gap-1 mb-4"></div>

        <div id="container" class="flex flex-col md:flex-row gap-4 md:gap-6 mb-8"></div>

        <footer class="glass p-5 rounded-xl relative overflow-hidden mb-4">
            <div class="fuel-bar"></div>
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 border border-blue-500/50 rounded-full flex items-center justify-center bg-blue-500/10">
                        <i class="fa-solid fa-microchip text-blue-400 text-lg"></i>
                    </div>
                    <div>
                        <p class="text-white font-header text-xs tracking-wider uppercase leading-none">Daenerys84</p>
                        <p id="footer-role" class="text-blue-500/60 uppercase text-[8px] font-bold mt-1">Miembro Directivo // Quimera Guild</p>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <a href="https://ko-fi.com/chainbreaker" target="_blank" class="px-5 py-1.5 bg-amber-500/5 border border-amber-500/30 rounded text-amber-500 font-header text-[9px] tracking-widest uppercase hover:bg-amber-500/10 transition-all">
                        <i class="fa-solid fa-bolt"></i> <span id="btn-tip">Propina Operativa</span>
                    </a>
                </div>
                <div class="flex items-center gap-4">
                    <p id="follow-text" class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">Sigue a Quimera:</p>
                    <div class="flex gap-4">
                        <a href="https://x.com/QuimeraSA_" target="_blank" class="text-slate-400 hover:text-white"><i class="fa-brands fa-x-twitter"></i></a>
                        <a href="https://discord.gg/aVM5KjMeB6" target="_blank" class="text-slate-400 hover:text-indigo-400"><i class="fa-brands fa-discord"></i></a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const API = 'https://holosim-galaxy.staratlas.com/territory-control';
        let activeTab = 'mud';
        let currentLang = 'es';

        const i18n = {
            es: { 
                dataLabel: "DATOS OFICIALES DEL:", 
                footerRole: "Miembro Directivo // Quimera Guild", 
                btnTip: "Propina Operativa", 
                sectorControl: "Control de Sector",
                followQuimera: "Sigue a Quimera:",
                timeMultiplier: "Multiplicador de Tiempo"
            },
            en: { 
                dataLabel: "OFFICIAL DATA FROM:", 
                footerRole: "Executive Member // Quimera Guild", 
                btnTip: "Support Project", 
                sectorControl: "Sector Control",
                followQuimera: "Follow Quimera:",
                timeMultiplier: "Time Multiplier"
            }
        };

        function changeLang(lang) {
            currentLang = lang;
            document.getElementById('data-label').innerText = i18n[lang].dataLabel;
            document.getElementById('footer-role').innerText = i18n[lang].footerRole;
            document.getElementById('btn-tip').innerText = i18n[lang].btnTip;
            document.getElementById('follow-text').innerText = i18n[lang].followQuimera;
            document.getElementById('label-multiplier').innerText = i18n[lang].timeMultiplier;
            loadData();
        }

        async function loadData() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                render(data);
            } catch (e) { console.error("Error fetching data"); }
        }

        function showTab(faction) {
            activeTab = faction;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(`tab-${faction}`);
            if(target) target.classList.add('active');
            
            document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
                btn.style.opacity = btn.id === `btn-${faction}` ? "1" : "0.5";
                btn.style.borderBottom = btn.id === `btn-${faction}` ? "2px solid currentColor" : "none";
            });
        }

        function render(data) {
            document.getElementById('data-age').innerText = new Date(data.timestamp).toLocaleString();
            document.getElementById('multiplier').innerText = data.timeMultiplier.toFixed(4);

            const cont = document.getElementById('container');
            const tabsCont = document.getElementById('mobile-tabs-container');
            const sorted = Object.entries(data.factions).sort(([,a], [,b]) => b.currentPoints - a.currentPoints);
            
            cont.innerHTML = '';
            tabsCont.innerHTML = '';

            sorted.forEach(([key, f], index) => {
                const colorClass = key === 'mud' ? 'text-red-500' : (key === 'oni' ? 'text-blue-500' : 'text-yellow-400');
                const bgRank = key === 'mud' ? 'bg-red-500' : (key === 'oni' ? 'bg-blue-500' : 'bg-yellow-500');
                
                tabsCont.innerHTML += `
                    <button onclick="showTab('${key}')" id="btn-${key}" class="mobile-tab-btn flex-1 py-2 glass text-[10px] font-header ${colorClass} transition-all">
                        ${key.toUpperCase()}
                    </button>
                `;

                cont.innerHTML += `
                    <div id="tab-${key}" class="tab-content ${key === activeTab ? 'active' : ''}">
                        <div class="card-wrapper">
                            <div class="rank-tag ${bgRank} text-black">RANK #${index + 1}</div>
                            <div class="glass p-4 rounded-lg neon-card ${key}-card ${index === 0 ? 'leader-glow' : ''}">
                                <div class="flex justify-between items-start mb-4 border-b border-white/5 pb-2">
                                    <div>
                                        <h2 class="font-header text-xl font-black uppercase ${colorClass}">${key}</h2>
                                        <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">${i18n[currentLang].sectorControl}</p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-xl font-bold text-white leading-none">${Math.floor(f.currentPoints).toLocaleString()}</p>
                                        <p class="text-[9px] text-emerald-400 font-bold mt-1">+${f.pointsAdded.toFixed(2)}</p>
                                    </div>
                                </div>
                                <div class="space-y-2">
                                    ${f.starbases.sort((a,b) => b.level - a.level).map(sb => `
                                        <div class="flex justify-between items-center border-b border-white/5 pb-1">
                                            <span class="text-[11px] text-slate-300 font-bold uppercase truncate mr-2">${sb.name.replace(/_/g, ' ')}</span>
                                            <div class="flex items-center gap-2 shrink-0">
                                                <span class="text-[8px] bg-white/5 px-1 rounded text-slate-500">L${sb.level}</span>
                                                <span class="${colorClass} font-bold text-[11px]">${sb.points.toFixed(1)}</span>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            showTab(activeTab);
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
