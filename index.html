<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holosim | Sector Dominance Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --neon-blue: #3b82f6;
            --neon-amber: #f59e0b;
        }

        body { 
            background: #010204; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden; min-height: 100vh;
        }
        .font-header { font-family: 'Orbitron', sans-serif; }
        
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1;
        }

        .glass { background: rgba(7, 10, 15, 0.8); border: 1px solid rgba(59, 130, 246, 0.1); backdrop-filter: blur(10px); }
        
        /* Glow Estático */
        .neon-card { position: relative; height: 100%; }
        .neon-card::after {
            content: ""; position: absolute; inset: -2px; 
            z-index: -1; filter: blur(12px); opacity: 0.15;
            border-radius: 8px;
        }

        .mud-card::after { background: #facc15; }
        .oni-card::after { background: #ef4444; }
        .ustur-card::after { background: #3b82f6; }

        .mud-card { border-left: 4px solid #facc15; }
        .oni-card { border-left: 4px solid #ef4444; }
        .ustur-card { border-left: 4px solid #3b82f6; }

        .btn-execute {
            background: rgba(59, 130, 246, 0.1); border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
            position: relative; overflow: hidden;
        }

        .fuel-bar {
            background: linear-gradient(90deg, var(--neon-amber) 0%, transparent 100%);
            height: 2px; width: 100%; position: absolute; bottom: 0; left: 0;
            box-shadow: 0 0 10px var(--neon-amber);
        }

        /* Lógica de Pestañas Móvil */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        @media (min-width: 768px) {
            .tab-content { display: block !important; }
            .mobile-tabs { display: none !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto flex flex-col min-h-[90vh]">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-end border-b border-blue-500/20 pb-6">
            <div class="mb-4 md:mb-0">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span>
                    <h1 class="font-header text-2xl font-bold uppercase tracking-tighter text-blue-500">Holosim <span class="text-white">Analytics</span></h1>
                </div>
                <p id="data-age" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-none italic">Iniciando sistemas...</p>
                <a href="https://holosim-galaxy.staratlas.com/territory-control" target="_blank" class="text-[9px] text-blue-400/40 hover:text-blue-400 transition-colors flex items-center gap-1 mt-2 uppercase tracking-wider font-bold">
                    <i class="fa-solid fa-satellite-dish text-[8px]"></i> Feed: Star Atlas Real-Time API
                </a>
            </div>
            
            <div class="flex flex-col items-end gap-4 w-full md:w-auto">
                <a href="https://holosim.staratlas.com/" target="_blank" class="btn-execute px-6 py-2 rounded-sm text-[10px] font-header tracking-[0.3em] text-blue-400 uppercase group transition-all hover:scale-105">
                    <i class="fa-solid fa-terminal mr-2 text-[8px] group-hover:text-white"></i> [ EXE: LAUNCH_HOLOSIM ]
                </a>

                <div class="text-right relative group">
                    <p class="text-[9px] text-slate-500 uppercase font-bold flex items-center justify-end gap-1 cursor-help tracking-widest">
                        Time Multiplier <i class="fa-solid fa-circle-info text-[10px] opacity-40"></i>
                    </p>
                    <p id="multiplier" class="text-xl font-header leading-none text-white">--</p>
                </div>
            </div>
        </header>

        <div class="mobile-tabs flex gap-2 mb-4">
            <button onclick="showTab('mud')" id="btn-mud" class="flex-1 py-2 glass text-[10px] font-header text-yellow-500 border-yellow-500/50">MUD</button>
            <button onclick="showTab('oni')" id="btn-oni" class="flex-1 py-2 glass text-[10px] font-header text-red-500 opacity-50">ONI</button>
            <button onclick="showTab('ustur')" id="btn-ustur" class="flex-1 py-2 glass text-[10px] font-header text-blue-500 opacity-50">USTUR</button>
        </div>

        <div id="container" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 flex-grow">
            </div>

        <footer class="mt-auto glass p-6 rounded-t-xl relative overflow-hidden">
            <div class="fuel-bar"></div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <div class="w-12 h-12 border-2 border-blue-500/50 rounded-full flex items-center justify-center bg-blue-500/10">
                            <i class="fa-solid fa-shield-halved text-blue-400 text-xl"></i>
                        </div>
                        <span class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-[#010204] rounded-full"></span>
                    </div>
                    <div>
                        <p class="text-white font-header text-sm tracking-widest uppercase">Daenerys84</p>
                        <p class="text-blue-500/60 uppercase text-[9px] tracking-[0.2em] font-bold">Chief Director // Quimera Guild</p>
                    </div>
                </div>

                <div class="flex flex-col items-center">
                    <a href="https://ko-fi.com/chainbreaker" target="_blank" class="group relative px-8 py-3 bg-amber-500/5 border border-amber-500/30 rounded transition-all hover:bg-amber-500/10">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-bolt-lightning text-amber-500 animate-pulse"></i>
                            <span class="text-amber-500 font-header text-[10px] tracking-[0.3em] uppercase">Energizar Sistema</span>
                        </div>
                    </a>
                </div>

                <div class="flex flex-col md:items-end gap-3">
                    <div class="flex gap-3">
                        <a href="#" class="text-slate-400 hover:text-white"><i class="fa-brands fa-x-twitter"></i></a>
                        <a href="#" class="text-slate-400 hover:text-white"><i class="fa-brands fa-discord"></i></a>
                        <a href="#" class="text-slate-400 hover:text-white"><i class="fa-solid fa-microchip"></i></a>
                    </div>
                    <p class="text-[9px] text-slate-600 uppercase tracking-widest font-bold">Signal Secured by Quimera Intel</p>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const API_ORIGINAL = 'https://holosim-galaxy.staratlas.com/territory-control';
        const PROXY_RAPIDO = `https://corsproxy.io/?${encodeURIComponent(API_ORIGINAL)}`;
        let activeTab = 'mud';

        async function loadData() {
            let data = null;
            try {
                const res = await fetch(API_ORIGINAL);
                if(res.ok) data = await res.json();
            } catch (e) {}
            if (!data) {
                try {
                    const res = await fetch(PROXY_RAPIDO);
                    if(res.ok) data = await res.json();
                } catch (e) {
                    document.getElementById('data-age').innerText = "SYSTEM ERROR: CONNECTION LOST";
                    return;
                }
            }
            if (data) render(data);
        }

        function showTab(faction) {
            activeTab = faction;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${faction}`).classList.add('active');
            
            // Actualizar botones
            ['mud', 'oni', 'ustur'].forEach(f => {
                const btn = document.getElementById(`btn-${f}`);
                btn.style.opacity = f === faction ? "1" : "0.5";
                btn.style.borderBottom = f === faction ? "2px solid" : "none";
            });
        }

        function render(data) {
            const date = new Date(data.timestamp);
            // RESTAURADO FORMATO ORIGINAL
            document.getElementById('data-age').innerText = "TERMINAL ACTUALIZADA: " + date.toLocaleTimeString();
            document.getElementById('multiplier').innerText = data.timeMultiplier.toFixed(4);

            const cont = document.getElementById('container');
            cont.innerHTML = '';

            ['mud', 'oni', 'ustur'].forEach(key => {
                const f = data.factions[key];
                const colorClass = key === 'mud' ? 'text-yellow-400' : (key === 'oni' ? 'text-red-500' : 'text-blue-500');
                
                cont.innerHTML += `
                    <div id="tab-${key}" class="tab-content ${key === activeTab ? 'active' : ''} h-full">
                        <div class="glass p-5 rounded-lg neon-card ${key}-card flex flex-col h-full">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h2 class="font-header text-2xl font-black uppercase tracking-tighter ${colorClass}">${key}</h2>
                                    <p class="text-[8px] text-slate-500 font-bold tracking-[0.4em] uppercase">Sector Control</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-xl font-bold font-header leading-none text-white tracking-tighter">${Math.floor(f.currentPoints).toLocaleString()}</p>
                                    <p class="text-[9px] text-emerald-400 font-bold uppercase mt-1 tracking-widest">+${f.pointsAdded.toFixed(2)}</p>
                                </div>
                            </div>
                            <div class="space-y-2 overflow-y-auto max-h-[40vh] md:max-h-none pr-2">
                                ${f.starbases.sort((a,b) => b.level - a.level).map(sb => `
                                    <div class="flex justify-between items-center border-b border-white/5 pb-2">
                                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider truncate mr-2">${sb.name}</span>
                                        <div class="flex items-center gap-3 shrink-0">
                                            <span class="text-[8px] bg-white/5 px-1.5 py-0.5 rounded text-slate-300 font-bold">LVL ${sb.level}</span>
                                            <span class="${colorClass} font-bold text-[10px]">${sb.points.toFixed(1)}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
